version: "3.8"

services:
  frontend:
    image: navistresundios/lamviec360-frontend:${DOCKER_IMAGE_TAG:-dev-latest}
    container_name: lv360_frontend_dev
    restart: always
    ports:
      - "3080:80"
    env_file:
      - .env.dev
    networks:
      - lv360-shared-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  lv360-shared-network:
    external: true
